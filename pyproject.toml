[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["tests"]
markers = [
    "integration: marks tests requiring PostgreSQL (deselect with '-m \"not integration\"')",
    "slow: marks slow tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
