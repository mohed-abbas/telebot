services:
  db:
    image: postgres:16-alpine
    container_name: telebot-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-telebot}
    ports:
      - "5433:5432"
    volumes:
      - telebot_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telebot"]
      interval: 5s
      timeout: 3s
      retries: 5

  mt5-simulator:
    build: ./mt5-simulator
    container_name: mt5-simulator
    restart: unless-stopped
    environment:
      MT5_API_KEY: ${MT5_API_KEY:-dev-api-key}
      SIMULATOR_PRICE_MODE: static
      SIMULATOR_BALANCE: "10000.0"
    ports:
      - "8001:8001"

  telebot:
    build: .
    container_name: telebot-dev
    restart: unless-stopped
    env_file: .env.dev
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./accounts.json:/app/accounts.json:ro
    depends_on:
      db:
        condition: service_healthy
      mt5-simulator:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  telebot_pgdata_dev:
