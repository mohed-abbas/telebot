services:
  mt5-bridge:
    build: .
    container_name: mt5-bridge
    restart: unless-stopped
    environment:
      # Format: "name:port,name:port,..."
      # Add more accounts by appending: "vantage:18812,fundednext:18813"
      MT5_ACCOUNTS: "vantage:18812"
      ENABLE_VNC: "${ENABLE_VNC:-false}"
    volumes:
      - mt5_vantage_wine:/root/.wine-vantage
      # Add per-account volumes as needed:
      # - mt5_fundednext_wine:/root/.wine-fundednext
    ports:
      # noVNC — shared display for all accounts
      - "6080:6080"
    networks:
      - data-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mt5_vantage_wine:
  # Add per-account volumes:
  # mt5_fundednext_wine:

networks:
  data-net:
    name: data-net
    external: true
