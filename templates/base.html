<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1a1a2e', 900: '#0f0f1a', 700: '#252542' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f1a; color: #e2e8f0; }
        .nav-active { background: #252542; border-left: 3px solid #818cf8; }
        .card { background: #1a1a2e; border: 1px solid #252542; border-radius: 0.75rem; }
        .profit { color: #4ade80; }
        .loss { color: #f87171; }
        .badge-buy { background: #065f46; color: #6ee7b7; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        .badge-sell { background: #7f1d1d; color: #fca5a5; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        .badge-connected { background: #065f46; color: #6ee7b7; }
        .badge-disconnected { background: #7f1d1d; color: #fca5a5; }
        table { width: 100%; }
        th { text-align: left; padding: 0.75rem; color: #94a3b8; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #252542; }
        td { padding: 0.75rem; border-bottom: 1px solid #1e1e35; font-size: 0.875rem; }
        .btn { padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn-red { background: #991b1b; color: #fca5a5; }
        .btn-blue { background: #1e3a5f; color: #93c5fd; }
        .btn-green { background: #065f46; color: #6ee7b7; }
        input[type="number"] { background: #252542; border: 1px solid #374151; color: #e2e8f0; padding: 0.25rem 0.5rem; border-radius: 0.25rem; width: 5rem; font-size: 0.75rem; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <nav class="w-56 bg-dark-800 border-r border-dark-700 flex flex-col min-h-screen fixed">
        <div class="p-4 border-b border-dark-700">
            <h1 class="text-lg font-bold text-indigo-400">Telebot</h1>
            <p class="text-xs text-slate-500 mt-1">Trading Dashboard</p>
        </div>
        <div class="flex-1 py-4">
            <a href="/overview" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'overview' %}nav-active{% endif %}">Overview</a>
            <a href="/positions" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'positions' %}nav-active{% endif %}">Positions</a>
            <a href="/history" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'history' %}nav-active{% endif %}">Trade History</a>
            <a href="/signals" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'signals' %}nav-active{% endif %}">Signal Log</a>
            <a href="/analytics" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'analytics' %}nav-active{% endif %}">Analytics</a>
            <a href="/settings" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'settings' %}nav-active{% endif %}">Settings</a>
        </div>
        <div class="p-4 border-t border-dark-700 text-xs text-slate-600">
            <div id="status-dot" class="inline-block w-2 h-2 rounded-full {% if trading_enabled %}bg-green-500{% else %}bg-red-500{% endif %} mr-1"></div>
            {% if trading_enabled %}
                {% if dry_run %}DRY-RUN{% else %}LIVE{% endif %}
            {% else %}
                DISABLED
            {% endif %}
        </div>
    </nav>

    <!-- Main content -->
    <main class="ml-56 flex-1 p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
