<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebot Dashboard</title>
    <link rel="stylesheet" href="{{ asset_url('app.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="/static/vendor/basecoat/basecoat.min.js"></script>
    <script defer src="/static/js/htmx_basecoat_bridge.js"></script>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <nav class="w-56 bg-dark-800 border-r border-dark-700 flex flex-col min-h-screen fixed">
        <div class="p-4 border-b border-dark-700">
            <h1 class="text-lg font-bold text-indigo-400">Telebot</h1>
            <p class="text-xs text-slate-500 mt-1">Trading Dashboard</p>
        </div>
        <div class="flex-1 py-4">
            <a href="/overview" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'overview' %}nav-active{% endif %}">Overview</a>
            <a href="/positions" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'positions' %}nav-active{% endif %}">Positions</a>
            <a href="/history" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'history' %}nav-active{% endif %}">Trade History</a>
            <a href="/signals" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'signals' %}nav-active{% endif %}">Signal Log</a>
            <a href="/analytics" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'analytics' %}nav-active{% endif %}">Analytics</a>
            <a href="/settings" class="block px-4 py-2.5 text-sm hover:bg-dark-700 {% if page == 'settings' %}nav-active{% endif %}">Settings</a>
        </div>
        <div class="px-4 pb-2">
            <a href="/logout" class="block px-4 py-2.5 text-sm hover:bg-dark-700 text-slate-400">Sign out</a>
        </div>
        <div class="p-4 border-t border-dark-700 text-xs text-slate-600">
            <div id="status-dot" class="inline-block w-2 h-2 rounded-full {% if trading_enabled %}bg-green-500{% else %}bg-red-500{% endif %} mr-1"></div>
            {% if trading_enabled %}
                {% if dry_run %}DRY-RUN{% else %}LIVE{% endif %}
            {% else %}
                DISABLED
            {% endif %}
        </div>
    </nav>

    <!-- Main content -->
    <main class="ml-56 flex-1 p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
