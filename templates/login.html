{% extends "base.html" %}
{% block content %}
<div class="min-h-screen -m-6 flex items-center justify-center bg-dark-900">
    <div class="card w-full max-w-md">
        <div class="card-header">
            <h1 class="text-2xl font-bold text-indigo-400">Telebot</h1>
            <p class="text-sm text-slate-400 mt-1">Sign in to continue</p>
        </div>

        <div class="card-body">
            <div class="space-y-4">
                {% if error %}
                <div class="alert alert-destructive" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/login" class="space-y-4" autocomplete="off">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="next_path" value="{{ next_path }}">

                    <div class="space-y-1">
                        <label for="password" class="label">
                            Password
                        </label>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            autofocus
                            required
                            class="input">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Sign in
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
