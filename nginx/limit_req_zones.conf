# Telebot login rate-limit zone (Phase 5 AUTH-05 / D-18).
# Install into the shared nginx http{} scope — e.g.
#   /home/murx/shared/nginx/conf.d/limit_req_zones.conf
# After placing, run: docker exec shared-nginx nginx -s reload
#
# 10 sustained attempts/minute per client IP with a burst allowance of 5.
# Trades roughly: single operator on a single browser won't hit this; a
# brute-force loop will.
limit_req_zone $binary_remote_addr zone=telebot_login:10m rate=10r/m;
