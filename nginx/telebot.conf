# Telebot Dashboard — Nginx Reverse Proxy Configuration
#
# Copy to your shared nginx conf.d directory on VPS:
#   cp nginx/telebot.conf /home/murx/shared/nginx/conf.d/telebot.conf
#
# Prerequisites:
#   1. Docker networks exist: docker network create proxy-net && docker network create data-net
#   2. Replace YOURDOMAIN.com with your actual domain
#   3. SSL certificate exists (run certbot for your subdomain first)
#
# After copying, reload nginx:
#   docker exec shared-nginx nginx -s reload

server {
    listen 80;
    server_name dashboard.YOURDOMAIN.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.YOURDOMAIN.com;

    ssl_certificate /etc/letsencrypt/live/dashboard.YOURDOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.YOURDOMAIN.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://telebot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (critical for /stream endpoint)
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_read_timeout 86400s;
    }
}
