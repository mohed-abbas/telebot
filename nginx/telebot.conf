# Telebot Dashboard — Nginx Reverse Proxy Configuration
#
# Copy to your shared nginx conf.d directory on VPS:
#   cp nginx/telebot.conf /home/murx/shared/nginx/conf.d/telebot.conf
#   cp nginx/limit_req_zones.conf /home/murx/shared/nginx/conf.d/limit_req_zones.conf
#
# Prerequisites:
#   1. Docker networks exist: docker network create proxy-net && docker network create data-net
#   2. Replace YOURDOMAIN.com with your actual domain
#   3. SSL certificate exists (run certbot for your subdomain first)
#
# After copying, reload nginx:
#   docker exec shared-nginx nginx -s reload

server {
    listen 80;
    server_name dashboard.YOURDOMAIN.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.YOURDOMAIN.com;

    ssl_certificate /etc/letsencrypt/live/dashboard.YOURDOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.YOURDOMAIN.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Login rate-limit (AUTH-05, D-18 belt-and-suspenders) ──
    # Depends on limit_req_zone in conf.d/limit_req_zones.conf (http{} scope).
    # Phase 12 (CUT-03): the legacy HTMX `/login` form POST was decommissioned;
    # the SPA authenticates via the JSON endpoint `/api/v2/auth/login`, so the
    # throttle must target that exact path (otherwise it falls through to the
    # unthrottled `location /` and brute-force protection is lost — 12-REVIEW WR-01).
    location = /api/v2/auth/login {
        limit_req zone=telebot_login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://telebot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://telebot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE block removed in Phase 12 (CUT-03): the legacy /stream endpoint was
        # deleted in Commit 1; the SPA uses 3s TanStack-Query polling, not SSE.
    }
}
